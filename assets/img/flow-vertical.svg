<svg viewBox="0 0 560 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttlD dscD" width="560" height="600">
  <title id="ttlD">How Paluwagan works, step by step</title>
  <desc id="dscD">A vertical three step flow: everyone contributes, Paluwagan records and confirms each payment without holding it, and one member receives the whole pot before the turn rotates.</desc>

  <rect x="16" y="16" width="528" height="568" rx="28" fill="#FAF6EC"></rect>
  <rect x="16.5" y="16.5" width="527" height="567" rx="27.5" fill="none" stroke="#E7E2D6" stroke-width="1.5"></rect>

  
  <line x1="96" y1="120" x2="96" y2="480" stroke="#C9A84C" stroke-width="4" stroke-linecap="round"></line>

  
  <circle cx="96" cy="130" r="34" fill="#FAF6EC" stroke="#C9A84C" stroke-width="4"></circle>
  <g fill="#102A4C">
    <circle cx="84" cy="124" r="8"></circle>
    <path d="M70,148 C70,135 76,129 84,129 C92,129 98,135 98,148 Z"></path>
    <circle cx="108" cy="124" r="8"></circle>
    <path d="M94,148 C94,135 100,129 108,129 C116,129 122,135 122,148 Z"></path>
    <circle cx="96" cy="131" r="10" stroke="#FAF6EC" stroke-width="2.5"></circle>
    <path d="M79,157 C79,141 87,133 96,133 C105,133 113,141 113,157 Z" stroke="#FAF6EC" stroke-width="2.5"></path>
  </g>
  <text x="156" y="122" font-family="&#39;DM Sans&#39;, Arial, sans-serif" font-weight="700" font-size="20" fill="#102A4C">Everyone contributes</text>
  <text x="156" y="148" font-family="&#39;DM Sans&#39;, Arial, sans-serif" font-weight="500" font-size="15" fill="#6B7686">The same amount each round, sent</text>
  <text x="156" y="169" font-family="&#39;DM Sans&#39;, Arial, sans-serif" font-weight="500" font-size="15" fill="#6B7686">directly, peso to peso.</text>

  
  <circle cx="96" cy="300" r="34" fill="#102A4C"></circle>
  <circle cx="96" cy="300" r="18" fill="#2E7D5B"></circle>
  <path d="M87,300 l6,6 l11,-13" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
  <text x="156" y="292" font-family="&#39;DM Sans&#39;, Arial, sans-serif" font-weight="700" font-size="20" fill="#102A4C">Paluwagan records it</text>
  <text x="156" y="318" font-family="&#39;DM Sans&#39;, Arial, sans-serif" font-weight="500" font-size="15" fill="#6B7686">It confirms every payment and</text>
  <text x="156" y="339" font-family="&#39;DM Sans&#39;, Arial, sans-serif" font-weight="500" font-size="15" fill="#6B7686">never holds your money.</text>

  
  <circle cx="96" cy="470" r="34" fill="#FAF6EC" stroke="#C9A84C" stroke-width="5"></circle>
  <circle cx="96" cy="432" r="7" fill="#C9A84C"></circle>
  <circle cx="96" cy="432" r="2.3" fill="#FAF6EC"></circle>
  <g fill="#102A4C">
    <circle cx="96" cy="463" r="11"></circle>
    <path d="M77,496 C77,479 85,471 96,471 C107,471 115,479 115,496 Z"></path>
  </g>
  <text x="156" y="462" font-family="&#39;DM Sans&#39;, Arial, sans-serif" font-weight="700" font-size="20" fill="#102A4C">One member receives</text>
  <text x="156" y="488" font-family="&#39;DM Sans&#39;, Arial, sans-serif" font-weight="500" font-size="15" fill="#6B7686">The whole pot this round, then</text>
  <text x="156" y="509" font-family="&#39;DM Sans&#39;, Arial, sans-serif" font-weight="500" font-size="15" fill="#6B7686">it's the next member's turn.</text>
</svg>